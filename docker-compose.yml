services:
  u2magic:
    image: ghcr.io/ihanr/u2magic-app:20260625
    restart: unless-stopped
    expose:
      - "18080"
    volumes:
      - u2magic-data:/data/u2
      - u2magic-logs:/data/u2Magic/logs
    extra_hosts:
      - "u2.dmhy.org:104.25.27.31"

  u2magic-logs:
    image: ghcr.io/ihanr/u2magic-logs:20260625
    restart: unless-stopped
    expose:
      - "18081"
    volumes:
      - u2magic-logs:/app/logs:ro

  u2-scripts:
    image: ghcr.io/ihanr/u2magic-scripts:20260625
    restart: unless-stopped
    environment:
      PYTHONUTF8: "1"
      U2_WEBUI_HOST: "0.0.0.0"
      U2_WEBUI_PORT: "18765"
      U2_WEBUI_CONFIG_PATH: "/runtime/webui_config.json"
      U2_WEBUI_LOG_DIR: "/runtime/logs"
      AUTO_MAGIC_DATA_PATH: "/runtime/auto_magic_seeds.data.txt"
      AUTO_MAGIC_LOG_PATH: "/runtime/auto_magic_seeds.log"
    expose:
      - "18765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - u2-scripts-data:/runtime

  gateway:
    image: ghcr.io/ihanr/u2magic-gateway:20260625
    restart: unless-stopped
    environment:
      NGINX_USERNAME: "admin"
      NGINX_PASSWORD: "请修改为自己的密码"
    depends_on:
      - u2magic
      - u2magic-logs
      - u2-scripts
    ports:
      - "18080:18080"
      - "18765:18765"

volumes:
  u2magic-data:
  u2magic-logs:
  u2-scripts-data:
